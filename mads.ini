[agents]
# Settings shared by all agents
frontend_address = "tcp://localhost:9090"
backend_address = "tcp://localhost:9091"
settings_address = "tcp://localhost:9092"
timecode_fps = 25


#  __  __                   _ _ _   _     _      
# |  \/  | ___  _ __   ___ | (_) |_| |__ (_) ___ 
# | |\/| |/ _ \| '_ \ / _ \| | | __| '_ \| |/ __|
# | |  | | (_) | | | | (_) | | | |_| | | | | (__ 
# |_|  |_|\___/|_| |_|\___/|_|_|\__|_| |_|_|\___|
#                                                

[broker]
frontend_address = "tcp://*:9090"
backend_address = "tcp://*:9091"
settings_address = "tcp://*:9092"
prefer_loopback_for_local_services = true
# The followings are only needed if using CURVE encryption
# auth_verbose = false
# ip_whitelist = ["127.0.0.1"] # default is empty (allow all)


[perf_assess]
pub_topic = "perf_assess"

[python]
pub_topic = "machine_tool_control"

#  ____  _             _           
# |  _ \| |_   _  __ _(_)_ __  ___ 
# | |_) | | | | |/ _` | | '_ \/ __|
# |  __/| | |_| | (_| | | | | \__ \
# |_|   |_|\__,_|\__, |_|_| |_|___/
#                |___/             
#


[publish]
pub_topic = "publish"

[feedback]
# Subscribes to ALL topics
sub_topic = [""]
print_width = 0
indent_width = 2

# The FMU machine simulator
[fmu_machine_tool]
period = 5
pub_topic = "fmu_machine_tool"
sub_topic = ["machine_tool_control"]
relative_tol = 1e-4
absolute_tol = 1e-5
hmin_tol = 1e-10
[fmu_machine_tool.parameters]
# default values from FMU
X0 = 0
XD = 100
XI = 0.001
XN = 100
XP = 0.3
Xdc = 0.1
Xm = 100
Xsat = 10000
Y0 = 0
YD = 100
YI = 0.001
YN = 100
YP = 0.3
Ydc = 0.1
Ym = 100
Ysat = 10000
Z0 = 0
ZD = 100
ZI = 0.001
ZN = 100
ZP = 0.3
Zdc = 0.1
Zm = 100
Zsat = 10000
res = 1e-06

# This is the Rerun viewer:
[machinetool]
sub_topic = ["fmu_machine_tool"]
initial_position = [0, 0, 200]
tool = {length = 100, diameter = 20, z_offset = 50}