[publish]
pub_topic = "publish"

[feedback]
# Subscribes to ALL topics
sub_topic = [""]
print_width = 0
indent_width = 2

# The FMU machine simulator
[fmu_machine_tool]
period = 5
pub_topic = "fmu_machine_tool"
sub_topic = ["machine_tool_control"]
relative_tol = 1e-4
absolute_tol = 1e-5
hmin_tol = 1e-10
[fmu_machine_tool.parameters]
# default values from FMU
# X axis
XP_pos = 3.2
XI_pos = 0
XD_pos = 0
XN_pos = 1
XP_vel = 4000
XI_vel = 0.2
XD_vel = 0
XN_vel = 1
X0 = 0
Xm = 300
Xdc = 0.1
Xsat = 10000
# Y axis
YP_pos = 3.2
YI_pos = 0
YD_pos = 0
YN_pos = 1
YP_vel = 2000
YI_vel = 0.2
YD_vel = 0
YN_vel = 1
Y0 = 0
Ym = 100
Ydc = 0.1
Ysat = 10000
# Z axis
ZP_pos = 3.2
ZI_pos = 0
ZD_pos = 0
ZN_pos = 1
ZP_vel = 3000
ZI_vel = 0.2
ZD_vel = 0
ZN_vel = 1
Z0 = 0
Zm = 200
Zdc = 0.1
Zsat = 10000
# Sensors resolution
res = 1e-06

# This is the Rerun viewer:
[machinetool]
queue_size=1
sub_topic = ["fmu_machine_tool"]
initial_position = [0, 0, 200]
tool = {length = 100, diameter = 20, z_offset = 50}